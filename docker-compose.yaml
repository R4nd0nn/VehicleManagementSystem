version: '3.8'

services:
  postgres:
    image: postgres
    container_name: vehicle_management_pgDB
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: vehicleManageDB
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - /home/docker_directory/postgres/data:/var/lib/postgresql/data
      - /home/docker_directory/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
      - /home/docker_directory/postgres/backup:/backup
    restart: always
    user: "999:999"

  rabbitmq:
    image: rabbitmq
    container_name: rabbitmq
    hostname: rabbitmq-host
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - /home/docker_directory/rabbitmq/data:/var/lib/rabbitmq
        # - /home/docker_directory/rabbitmq/logs:/var/log/rabbitmq
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx-gateway
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
    - "host.docker.internal:host-gateway"  # 添加这一行  
    volumes:
      - /home/docker_directory/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/docker_directory/nginx/logs:/var/log/nginx
      - ./dist:/usr/share/nginx/html:ro  # 前端静态文件挂载到这里
    depends_on:
      - user-management
      - java-app  
    restart: always
  
  java-app:
    image: openjdk:latest
    container_name: vehicle-management-app
    volumes:
      - ./management-system-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: java -jar /app/app.jar
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vehicleManageDB
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin123
    depends_on:
      - postgres
      - rabbitmq
    restart: always

  user-management:
    image: quay.io/centos/centos:stream9
    container_name: user-management-service
    working_dir: /app
    command: sh -c "dnf install -y postgresql-libs && ./user_management"
    ports:
    - "8081:8081"
    volumes:
    - /home/VehicleManagementSystem/user_management/output/user_management:/app/user_management
    environment:
    - DB_HOST=postgres
    - DB_PORT=5432
    - DB_USER=admin
    - DB_PASSWORD=admin123
    - DB_NAME=vehicleManageDB
    depends_on:
    - postgres
    restart: unless-stopped