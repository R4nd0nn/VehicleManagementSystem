upstream user_service {
    server user-management:8081;
}

upstream java_service {
    server java-app:8082;
}

server {
    listen 80;
    server_name localhost;

    charset utf-8;
    client_max_body_size 10M;
    root /usr/share/nginx/html;
    index index.html;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # 全局解决：所有响应都强制带跨域头
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, token, istoken, repeatsubmit" always;

    # 全局处理 OPTIONS
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ==================== 测试环境 API ====================
    location ~ ^/dev-api/user_mng/(.*)$ {
        proxy_pass http://user_service/user_mng/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ~ ^/dev-api/system/(.*)$ {
        proxy_pass http://java_service/api/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ==================== 生产环境 API ====================
    location ~ ^/prod-api/user_mng/(.*)$ {
        proxy_pass http://user_service/user_mng/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ~ ^/prod-api/system/(.*)$ {
        proxy_pass http://java_service/api/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ==================== 前端 ====================
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}